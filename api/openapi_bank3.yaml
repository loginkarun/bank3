openapi: 3.0.3
info:
  title: bank3 API
  version: 1.0.0
  description: Generated from LLD batch in pipeline bank3_main - Shopping Cart API
servers:
  - url: https://example.com
    description: Production server
tags:
  - name: Cart
    description: Shopping cart operations
paths:
  /api/cart/add:
    post:
      tags:
        - Cart
      summary: Add item to cart
      description: Adds a product to the shopping cart with specified quantity
      operationId: SCRUM-11689_add_item_to_cart_post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemRequest'
      responses:
        '201':
          description: Item successfully added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Bad request - Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cart:
    get:
      tags:
        - Cart
      summary: Get cart
      description: Retrieves the current user's shopping cart with all items and totals
      operationId: SCRUM-11689_get_cart_get
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cart/update:
    put:
      tags:
        - Cart
      summary: Update quantity
      description: Updates the quantity of a product in the cart
      operationId: SCRUM-11689_update_quantity_put
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Cart updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Bad request - Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found in cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cart/remove/{id}:
    delete:
      tags:
        - Cart
      summary: Remove item
      description: Removes a specific item from the cart by product ID
      operationId: SCRUM-11689_remove_item_delete
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID to remove from cart
          schema:
            type: string
      responses:
        '200':
          description: Item removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '404':
          description: Item not found in cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cart/clear:
    delete:
      tags:
        - Cart
      summary: Clear cart
      description: Removes all items from the cart
      operationId: SCRUM-11689_clear_cart_delete
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AddItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          description: Unique identifier of the product
          example: "PROD-12345"
        quantity:
          type: integer
          minimum: 1
          description: Quantity of the product to add
          example: 2
    UpdateItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          description: Unique identifier of the product
          example: "PROD-12345"
        quantity:
          type: integer
          minimum: 1
          description: New quantity for the product
          example: 3
    CartResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique cart identifier
          example: "CART-67890"
        userId:
          type: string
          description: User identifier who owns the cart
          example: "USER-123"
        items:
          type: array
          description: List of items in the cart
          items:
            $ref: '#/components/schemas/CartItem'
        totals:
          type: number
          format: double
          description: Total cost of all items in cart
          example: 299.99
    CartItem:
      type: object
      properties:
        productId:
          type: string
          description: Product identifier
          example: "PROD-12345"
        name:
          type: string
          description: Product name
          example: "Wireless Mouse"
        price:
          type: number
          format: double
          description: Unit price of the product
          example: 29.99
        quantity:
          type: integer
          minimum: 1
          description: Quantity of this product in cart
          example: 2
        subtotal:
          type: number
          format: double
          description: Subtotal for this line item (price * quantity)
          example: 59.98
    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: "Cart cleared successfully"
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the operation
          example: "2024-01-15T10:30:00Z"
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Timestamp when error occurred
          example: "2024-01-15T10:30:00Z"
        traceId:
          type: string
          description: Unique trace identifier for debugging
          example: "abc123xyz789"
        errorCode:
          type: string
          description: Application-specific error code
          example: "PRODUCT_NOT_FOUND"
        message:
          type: string
          description: Human-readable error message
          example: "Product not found"
        details:
          type: array
          description: Detailed error information
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: Field name that caused the error
          example: "productId"
        issue:
          type: string
          description: Description of the issue
          example: "Product does not exist in catalog"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authenticated users
  parameters:
    ProductIdPathParam:
      name: id
      in: path
      required: true
      description: Product identifier
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request - Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict - Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
